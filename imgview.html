<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Image Viewer - Nobody</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" href="/files/icon.png?">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    touch-action:none;
  }
  #container{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
    cursor:grab;
  }
  #container:active{cursor:grabbing;}
  #panzoom{
    position:absolute;
    top:0;left:0;
    transform-origin:0 0;
    touch-action:none;
  }
  img{
    position:absolute;
    display:block;
    user-select:none;
    pointer-events:none;
  }
  #ui{
    background:rgba(0,0,0,0.55);
    border-radius:5px;
    position:absolute;
    bottom:16px;
    right:16px;
    z-index:10;
    display:flex;
    align-items:center;
    gap:6px;
  }
  #ui button{
    background:rgba(0,0,0,0.55);
    color:#fff;
    border:1px solid rgba(255, 255, 255, 0.18);
    padding:8px 13px;
    cursor:pointer;
    border-radius:5px;
    font-size:16px;
    line-height:1;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    transition:background 0.15s;
  }
  #ui button:hover{background:rgba(255,255,255,0.15);}
  #ui button:active{background:rgba(255,255,255,0.25);}
  #zoom-label{
    color:rgba(255,255,255,0.55);
    font-size:12px;
    min-width:4ch;
    text-align:center;
    pointer-events:none;
    user-select:none;
  }
</style>
</head>
<body>
<div id="container">
  <div id="panzoom">
    <img id="image" alt="">
  </div>
  <div id="ui">
    <button id="zoomOut">−</button>
    <span id="zoom-label">100%</span>
    <button id="zoomIn">+</button>
    <button id="reset">Fit</button>
  </div>
</div>
<script src="/files/panzoom.js"></script>
<script>
  const icon=document.querySelector('link[rel="icon"]');
  const title=document.querySelector('title');
  const src=location.hash.slice(1);
  if (!src){
    document.body.innerHTML='<p style="color:red;padding:1rem">No image specified.</p>';
    throw new Error('No image src');
  }
  const fileName=src.split('#')[0].split('?')[0].split('/').pop();
  const container=document.getElementById('container');
  const panzoomEl=document.getElementById('panzoom');
  const img=document.getElementById('image');
  const zoomLabel=document.getElementById('zoom-label');
  img.onerror=()=>{
    document.body.innerHTML='<p style="color:red;padding:1rem">Failed to load image.</p>';
  };
  img.onload=()=>{
    requestAnimationFrame(()=>{
      const iw=img.naturalWidth;
      const ih=img.naturalHeight;
      function applyFitLayout(){
        const cw=container.clientWidth;
        const ch=container.clientHeight;
        panzoomEl.style.width =cw+'px';
        panzoomEl.style.height=ch+'px';
        const s=Math.min(cw/iw,ch/ih);
        const fw=iw*s;
        const fh=ih*s;
        img.style.width=fw+'px';
        img.style.height=fh+'px';
        img.style.left=((cw-fw)/2)+'px';
        img.style.top=((ch-fh)/2)+'px';
      }
      applyFitLayout();
      const panzoom=Panzoom(panzoomEl,{
        maxScale:1000,
        minScale:1,
      });
      function updateLabel(){
        zoomLabel.textContent=Math.round(panzoom.getScale()*100)+'%';
      }
      updateLabel();
      panzoomEl.addEventListener('panzoomzoom',updateLabel);
      function resetToFit(animate=false) {
        applyFitLayout();
        panzoom.zoom(1,{animate});
        panzoom.pan(0,0,{animate});
      }
      const isTouchPrimary=window.matchMedia('(pointer: coarse)').matches;
      if(!isTouchPrimary){
        container.addEventListener('wheel',(e)=>{
          panzoom.zoomWithWheel(e);
        },{passive:false});
      }
      if(isTouchPrimary){
        const activeTouches=new Map();
        function touchPoints(){return [...activeTouches.values()];}
        function dist(a, b){return Math.hypot(b.x-a.x,b.y-a.y);}
        function mid(a, b){return {x:(a.x+b.x)/2,y:(a.y+b.y)/ 2};}
        let prevPoints=[];
        function updateTouches(e){
          for(const t of e.changedTouches){
            activeTouches.set(t.identifier,{x:t.clientX,y:t.clientY});
          }
        }
        panzoomEl.addEventListener('touchstart',(e)=>{
          e.preventDefault();
          updateTouches(e);
          prevPoints=touchPoints();
        },{passive:false});
        panzoomEl.addEventListener('touchmove',(e)=>{
          e.preventDefault();
          updateTouches(e);
          const cur=touchPoints();
          if(cur.length>=2&&prevPoints.length>=2){
            const scaleDelta=dist(cur[0],cur[1])/dist(prevPoints[0],prevPoints[1]);
            const newScale=Math.min(20,Math.max(1,panzoom.getScale()*scaleDelta));
            panzoom.zoom(newScale,{animate:false});
            const m1=mid(prevPoints[0],prevPoints[1]);
            const m2=mid(cur[0],cur[1]);
            const {x,y}=panzoom.getPan();
            panzoom.pan(x+(m2.x-m1.x),y+(m2.y-m1.y),{animate:false});
          } else if(cur.length===1&&prevPoints.length>=1){
            const{x,y}=panzoom.getPan();
            panzoom.pan(
              x+(cur[0].x-prevPoints[0].x),
              y+(cur[0].y-prevPoints[0].y),
              {animate:false}
            );
          }
          prevPoints=cur;
        },{passive:false});
        panzoomEl.addEventListener('touchend',(e)=>{
          e.preventDefault();
          for(const t of e.changedTouches)activeTouches.delete(t.identifier);
          prevPoints=touchPoints();
        },{passive:false});
      }
      const btnZoomIn=document.getElementById('zoomIn');
      const btnZoomOut=document.getElementById('zoomOut');
      const btnReset=document.getElementById('reset');
      btnZoomIn.onclick=()=>panzoom.zoom(panzoom.getScale()*1.3,{animate:true});
      btnZoomOut.onclick=()=>panzoom.zoom(panzoom.getScale()/1.3,{animate:true});
      btnReset.onclick=()=>resetToFit(true);
      [btnZoomIn,btnZoomOut,btnReset].forEach(btn=>{
        btn.addEventListener('dblclick',e=>e.stopPropagation());
      });
      let resizeTimer;
      window.addEventListener('resize',()=>{
        clearTimeout(resizeTimer);
        resizeTimer=setTimeout(()=>resetToFit(false),120);
      });
      container.addEventListener('dblclick',()=>{
        if(panzoom.getScale()>1.05){
          resetToFit(true);
        }else{
          panzoom.zoom(panzoom.getScale()*2,{animate:true});
        }
      });
    });
  };
  img.src=src;
  icon.href=src;
  title.innerText=`${fileName} | Image Viewer - Nobody`;
</script>
</body>
</html>
