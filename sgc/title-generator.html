<body>

  <h1 class="page-title">SGC Titel Generator</h1>
  <p class="subtitle">Skriv · Förhandsgranska · Ladda ned</p>

  <div>
    <label for="textInput">Text</label>
    <input type="text" id="textInput" placeholder="Hello, world…" autocomplete="off" />

    <p>Förhandsgranskning</p>
    <div id="previewBox">
      <span>Börja skriva för att förhandsgranska</span>
    </div>

    <button id="downloadBtn" disabled>↓ Ladda ned PNG</button>
  </div>
  <canvas id="canvas" style="display:none"></canvas>

  <script>
    const input       = document.getElementById('textInput');
    const previewBox  = document.getElementById('previewBox');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');

    input.addEventListener('input', () => {
      const val = input.value.trim();
      if (val) {
        previewBox.innerHTML = `<h1 class="sgc-h1">${escapeHtml(val)}</h1>`;
        downloadBtn.disabled = false;
      } else {
        previewBox.innerHTML = `<span class="placeholder-text">Start typing to preview</span>`;
        downloadBtn.disabled = true;
      }
    });

    downloadBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;

      const W = 1200, H = 400;
      canvas.width  = W;
      canvas.height = H;

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      const fontSize = 96;
      ctx.font = `700 ${fontSize}px 'Fraunces', Georgia, serif`;
      ctx.fillStyle = '#1a1208';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, W / 2, H / 2);

      const link = document.createElement('a');
      link.download = 'image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
