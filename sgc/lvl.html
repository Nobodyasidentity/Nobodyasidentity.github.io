<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script defer src="/main.js"></script>
  <title>SGC GamerBot Public Info Lookup</title>
  <style>
    table{margin-top:10px;}
    th{text-align:left;padding:5px 10px;}
    #progressContainer{
      width:300px;
      height:20px;
      background:#333;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }
    #progressBar{
      height:100%;
      width:0%;
      background:#4caf50;
      transition:width 0.3s ease;
    }
    #progressText,#messageEstimate{
      margin-top:5px;
      font-size:14px;
    }
    #progressText{
      margin-top:0px;
      padding-left:10px;
    }
  </style>
</head>
<body>
  <button onclick="fetchInfo(User.id.value||defaultId)">Fetch Info</button>
  <table>
    <tr>
      <th>User ID:</th>
      <th><input id="userId" placeholder="Example: 821999148156715029"></th>
    </tr>
    <tr>
      <th>Level:</th>
      <th id="userLevel">?</th>
    </tr>
    <tr>
      <th>XP:</th>
      <th id="userXp">?</th>
    </tr>
    <tr>
      <th>Frame:</th>
      <th><img style="max-width:200px;" id="userFrame"></th>
    </tr>
  </table>
  <div id="progressContainer">
    <div id="progressBar">
      <div id="progressText"></div>
    </div>
  </div>
  <div id="messageEstimate"></div>
  <details>
    <summary>raw data</summary>
    <pre id="out" class="codeblock"></pre>
  </details>
  <script>
    const defaultId="821999148156715029";
    const out=document.getElementById('out');

    let User={
      id:document.getElementById('userId'),
      level:document.getElementById('userLevel'),
      xp:document.getElementById('userXp'),
      frame:document.getElementById('userFrame'),
    };
    const hash=location.hash.slice(1);
    async function getP(UID){
      try{
        const response=await fetch(`https://api.sgc.se/public_api/user/${UID}`);
        if(!response.ok)throw new Error("Failed to fetch");
        return await response.json();
      }catch(error){alert(error);}
    }
    function updateUI(data){
      if(!data)return;
      User.frame.src=`https://api.sgc.se/public_api/frame/${data.profileFrame}`;
      User.frame.style.backgroundColor=data.colorHexCode;
      User.id.value=data.userID;
      User.id.placeholder=`Recent: ${data.userID}`;
      User.level.innerText=data.level;
      User.xp.innerText=data.xp;
      const xpNeeded=data.level**2;
      const xpLeft=xpNeeded-data.xp;
      const percent=Math.min((data.xp/xpNeeded)*100,100);
      document.getElementById("progressBar").style.width=percent+"%";
      document.getElementById("progressText").innerText=`${data.xp} / ${xpNeeded} XP (${percent.toFixed(1)}%)`;
      const minMessages=Math.ceil(xpLeft/3);
      const maxMessages=Math.ceil(xpLeft/1+1);
      document.getElementById("messageEstimate").innerText=`Estimated ${minMessages}–${maxMessages} messages to level up`;
    }
    function fetchInfo(UID){
      getP(UID).then(data=>{
        if(!data||!data.userID){
          alert("User not found");
          return;
        }
        out.innerText=JSON.stringify(data,null,2);
        updateUI(data);
        location.hash=UID;
        localStorage.setItem('SGCLastUserID',UID);
      });
    }
    (()=>{
      const savedId=localStorage.getItem('SGCLastUserID');
      const idToUse=hash||savedId||defaultId;
      User.id.placeholder=`Example: ${defaultId}`
      fetchInfo(idToUse);
    })();
  </script>
</body>
</html>
