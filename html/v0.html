<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script defer src="/main.js"></script>
    <title>HTML IDE v0</title>
    <style>
      div.content{
        border-style: dashed;
        border-width: 1px;
        border-color: light-dark(#808080, #454545);
        border-radius: 5px;
        background-color: inherit;
        width: fit-content;
      }
      div.content iframe {
        border-style: hidden;
        border-radius: 5px;
        height: 300px;
        width: 99vw;
        resize: both;
        overflow: auto;
      }
      textarea.code{
        height: 100px;
        width: 99vw;
      }
    </style>
    <script src="/files/lzstr.js"></script>
  </head>
  <body>
    <textarea class="code" id="code" onkeyup="trygen()"></textarea><br>
    <input type="checkbox" id="doautoupd"><label for="doautoupd"> Auto</label>
    <button onclick="gen()">Generate</button>
    <button onclick="document.getElementById('linkSettings').style.display=(this.innerHTML=='Link |')?'inline-block':'none';this.innerHTML=(this.innerHTML=='Link |')?'Link >':'Link |'">Link |</button>
    <div style="display:none" id="linkSettings">
      <input type="checkbox" id="generateonload" checked=true><label for="generateonload"> Generate on Load</label>
      <button onclick="genLink()">Copy Permanent Link</button>
    </div><br><br>
    <div class="content"><iframe id="iframe" srcdoc='<html data-theme="dark"><script defer src="/files/main.js"></script></html>'></iframe></div>
    <script>
      function getUrlVars(){var vars={};var parts=window.location.href.replace(/[?&]+([^=&]+)=([^&]*)/gi,function(m,key,value){vars[key]=value;});return vars;}
      const code = document.getElementById('code');
      const iframe = document.getElementById('iframe');
      var query = getUrlVars();
      function gen(){
        iframe.src=undefined;
        iframe.contentDocument.body.innerHTML = code.value;
      }
      function trygen(){
        if(document.getElementById('doautoupd').checked==true){gen()}
      }
      function copy2clipboard(txt){
        navigator.clipboard.writeText(txt);
        alert('copied: '+txt);
      }
      function genLink(){
        copy2clipboard('https://'+window.location.hostname+window.location.pathname+'?'+((document.getElementById('generateonload').checked)?'genonload=&':'')+'code='+encodeURIComponent(btoa(encodeURIComponent(code.value))));
      }
      function onLoad(){
        if (query['code']!=undefined){
          if(query['encoding']=='LZstr'){
            code.value=decodeURIComponent(LZString.decompress(query['code']));
          }else{
            code.value=decodeURIComponent(atob(decodeURIComponent(query['code'])));
          }
        }
        if (query['genonload']!=undefined){gen()}
      }
      window.onload=onLoad;
    </script>
  </body>
</html>
