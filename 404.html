<!DOCTYPE html>
<html><head><script defer src="/main.js"></script><style>body{background-color:black;}</style><title>404</title></head>
  <body>
    <br><center><h1>404 Page Not Found</h1><p id="link">The Requested Page Was Not Found</p></center>
    <br><div id="recommendations" style="margin:50px auto;text-align:left;max-width:600px;padding:1.5rem;"> </div><script>
    function isElectron(){return navigator.userAgent.toLowerCase().includes('electron');}
    function pageAvailable(item){if(!item.works)return true;const env=isElectron()?'app':'web';if(!(env in item.works))return true;return item.works[env]!==false;}
    onload=()=>fetch("/pages.json").then(r=>r.json()).then(p=>{let x=location.pathname.toLowerCase().replace(/[^a-z0-9]/g,""),u=s=>new Set(s),i=(a,b)=>[...a].filter(c=>b.has(c)).length,f=a=>a.replace(/\.html?$/i,"");let flat=[];function walk(items){(items||[]).forEach(item=>{if(!pageAvailable(item))return;if(item.url)flat.push([f(item.url),item.title]);if(item.pages)walk(item.pages);});}(p.branches||[]).forEach(b=>walk(b.pages));let s=flat.map(([a,t])=>({a,t,v:i(u(x),u(a.toLowerCase().replace(/[^a-z0-9]/g,"")))})).sort((a,b)=>b.v-a.v||a.t.localeCompare(b.t)).filter(e=>e.v);link.innerText=`"${location.hostname+location.pathname}" Was Not Found`;recommendations.innerHTML=s.length?`<p><b>Did you mean:</b></p><ul>${s.slice(0,5).map(e=>`<li><a href="${e.a}${window.location.href.split('?')[1]!==undefined?'?'+window.location.href.split('?')[1]:''}">${e.t}</a></li>`).join``}</ul>`:`<center><p>No similar pages found.</p></center>`;});
    </script>
  </body>
</html>
