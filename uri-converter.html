<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="/main.js"></script>
  <meta charset="UTF-8">
  <title>URI Converter - Nobody</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;padding:2rem}
    h1{margin-bottom:1.5rem;font-size:1.5rem}

    .tabs{display:flex;gap:.25rem;margin-bottom:1rem}
    .tab{padding:.35rem .9rem;border:1px solid var(--bg-3);border-radius:4px;cursor:pointer;font-size:.85rem;background:transparent}
    .tab.active{background:var(--fg-dim);color:#000;border-color:transparent}

    .card{border:1px solid var(--bg-3);border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;background:var(--bg-input)}
    .card.drag-over{border-color:var(--accent,#6ee7b7);opacity:.85}
    label{display:block;margin-bottom:.5rem;font-size:.85rem}

    input[type="file"]{width:100%;padding:.5rem;border:1px solid;border-radius:4px;cursor:pointer}

    .url-row{display:flex;gap:.5rem}
    .url-row input[type="text"]{flex:1;padding:.5rem .75rem;border:1px solid var(--bg-3);border-radius:4px;font-size:.9rem;background:var(--bg-input);color:inherit}
    .url-row input[type="text"]:focus{outline:1px solid var(--accent,#6ee7b7)}

    .drop-hint{text-align:center;padding:1.5rem;border:1.5px dashed var(--fg-dim);border-radius:6px;font-size:.8rem;color:var(--dim);margin-top:.75rem;pointer-events:none}

    button{padding:.5rem 1.2rem;border:none;border-radius:4px;cursor:pointer;font-size:.9rem}
    button:disabled{cursor:not-allowed;opacity:.4}
    .btn-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-top:1rem}

    #status{margin-top:1rem;font-size:.85rem;min-height:1.2em;color:#6ee7b7}
    #status.error{color:#f87171}

    .output-section{display:none}
    .output-section.visible{display:block}

    .uri-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
    .uri-header label{margin:0}
    .uri-len{font-size:.75rem;color:var(--dim)}

    textarea{width:100%;height:120px;border:1px solid;border-radius:4px;font-size:.75rem;padding:.5rem;resize:vertical}

    #previewImage{max-width:100%;max-height:300px;border-radius:4px;border:1px solid var(--border);display:block;margin-top:1rem}
    .meta{font-size:.8rem;margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.4rem}
    .tag{border-radius:4px;padding:.2rem .5rem;font-size:.75rem;background:var(--bg-3)}
  </style>
</head>
<body>
    <h1 style="display:inline;">Data URI Converter </h1>
    <span style="display:inline;">Fully Client-side!</span>

  <div class="card" id="inputCard">
    <div class="tabs">
      <button class="tab active" id="tabFile">File</button>
      <button class="tab" id="tabUrl">URL</button>
    </div>

    <div id="paneFile">
      <label for="fileInput">Select a file (image, text, audio, video, archive, PDF, …)</label>
      <input type="file" id="fileInput">
      <div class="drop-hint">or drag &amp; drop a file here</div>
    </div>

    <div id="paneUrl" style="display:none">
      <label for="urlInput">Enter a file URL</label>
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="https://example.com/image.png" spellcheck="false">
        <button id="fetchBtn">Fetch</button>
      </div>
    </div>

    <div class="btn-row">
      <button id="convertBtn" disabled>Convert to Data URI</button>
      <button id="copyBtn" disabled>Copy URI</button>
      <button id="downloadBtn" disabled>Download .txt</button>
      <button id="resetBtn" style="margin-left:auto;opacity:.6" disabled>Clear</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="metaCard" class="card output-section">
    <label>File info</label>
    <div id="metaInfo" class="meta"></div>
  </div>

  <div id="uriCard" class="card output-section">
    <div class="uri-header">
      <label>Data URI</label>
      <span class="uri-len" id="uriLen"></span>
    </div>
    <textarea id="uriOutput" readonly></textarea>
  </div>

  <div id="previewCard" class="card output-section">
    <label>Preview</label>
    <img id="previewImage" alt="Preview">
    <pre id="textPreview" style="white-space:pre-wrap;word-break:break-all;font-size:0.8rem;color:#d1d5db;max-height:200px;overflow:auto;"></pre>
  </div>

  <script>

        md:"text/markdown",
        svg:"image/svg+xml",

}
  const $=t=>document.getElementById(t),fileInput=$("fileInput"),urlInput=$("urlInput"),convertBtn=$("convertBtn"),copyBtn=$("copyBtn"),downloadBtn=$("downloadBtn"),resetBtn=$("resetBtn"),fetchBtn=$("fetchBtn"),status=$("status"),uriOutput=$("uriOutput"),uriLen=$("uriLen"),metaInfo=$("metaInfo"),previewImg=$("previewImage"),textPrev=$("textPreview"),inputCard=$("inputCard"),cards={meta:$("metaCard"),uri:$("uriCard"),preview:$("previewCard")};let lastResult=null,activeTab="file",pendingFile=null;function setStatus(t,e=!1){status.textContent=t,status.className=e?"error":""}function showCard(t,e=!0){cards[t].classList.toggle("visible",e)}function resetOutput(){Object.values(cards).forEach(t=>t.classList.remove("visible")),uriOutput.value="",uriLen.textContent="",previewImg.src="",textPrev.textContent="",lastResult=null,copyBtn.disabled=!0,downloadBtn.disabled=!0,resetBtn.disabled=!0,setStatus("")}function setReady(t){convertBtn.disabled=!t}$("tabFile").addEventListener("click",()=>{activeTab="file",$("tabFile").classList.add("active"),$("tabUrl").classList.remove("active"),$("paneFile").style.display="",$("paneUrl").style.display="none",setReady(!!pendingFile),resetOutput()}),$("tabUrl").addEventListener("click",()=>{activeTab="url",$("tabUrl").classList.add("active"),$("tabFile").classList.remove("active"),$("paneUrl").style.display="",$("paneFile").style.display="none",setReady(urlInput.value.trim().length>0),resetOutput()}),fileInput.addEventListener("change",()=>{setReady(!!(pendingFile=fileInput.files[0]||null)),resetOutput()}),urlInput.addEventListener("input",()=>{setReady(urlInput.value.trim().length>0)}),urlInput.addEventListener("keydown",t=>{"Enter"===t.key&&urlInput.value.trim()&&convertBtn.click()}),fetchBtn.addEventListener("click",()=>{"url"===activeTab&&convertBtn.click()}),inputCard.addEventListener("dragover",t=>{t.preventDefault(),inputCard.classList.add("drag-over")}),inputCard.addEventListener("dragleave",()=>inputCard.classList.remove("drag-over")   </script>
</body>
</html>
